<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DESTROYER TV Signal Injector</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a14;
      color: #e0e0e0;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e1e2e;
    }

    .header h2 {
      margin: 0;
      font-size: 16px;
      color: #00ff88;
      letter-spacing: 0.5px;
    }

    .status-badge {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      background: #1e1e2e;
      color: #888;
      transition: all 0.3s;
    }

    .status-badge.active {
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.3);
    }

    .setting {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      background: #141420;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #00ff88;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.1);
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toggle-switch {
      width: 44px;
      height: 24px;
      background: #2a2a3a;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .toggle-switch.on {
      background: rgba(0, 255, 136, 0.3);
    }

    .toggle-switch::after {
      content: '';
      width: 18px;
      height: 18px;
      background: #e0e0e0;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: left 0.3s;
    }

    .toggle-switch.on::after {
      left: 23px;
      background: #00ff88;
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      border: none;
      border-radius: 6px;
      color: #0a0a14;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #1e1e2e;
      color: #e0e0e0;
    }

    .btn-secondary:hover {
      background: #2a2a3a;
    }

    .log {
      background: #141420;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 8px;
      max-height: 120px;
      overflow-y: auto;
      margin-top: 12px;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: #888;
    }

    .log-entry {
      padding: 2px 0;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>⚡ DESTROYER</h2>
    <div id="statusBadge" class="status-badge">...</div>
  </div>

  <div class="setting toggle">
    <div>Monitor TradingView</div>
    <div id="mainToggle" class="toggle-switch on"></div>
  </div>

  <div class="setting">
    <label>Webhook URL</label>
    <input type="text" id="webhookUrl" placeholder="https://your-vps:8721/signal">
  </div>

  <div class="setting">
    <label>Auth Token</label>
    <input type="password" id="token" placeholder="destroyer-sig-2026">
  </div>

  <div class="setting">
    <label>Poll Interval</label>
    <select id="pollInterval">
      <option value="0.5">30 seconds</option>
      <option value="1" selected>1 minute</option>
      <option value="3">3 minutes</option>
      <option value="5">5 minutes</option>
    </select>
  </div>

  <button id="saveBtn" class="btn">Save Config</button>
  <button id="scrapeNow" class="btn btn-secondary">Scrape Now</button>

  <div class="log" id="log">
    <div class="log-entry">— Log —</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
